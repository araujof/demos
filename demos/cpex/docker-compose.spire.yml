# Additive SPIRE layer for the CPEX HR demo.
#
# Brings up the SPIFFE workload-identity authority (spire-server) and its
# OIDC discovery provider (spire-oidc) so Keycloak can validate JWT-SVIDs.
# This file is ADDITIVE: it adds services on the demo's existing compose
# network and changes nothing in docker-compose.yml, so the running HR
# demo is unaffected until we wire Keycloak to trust SPIRE (Brick 2).
#
# For the demo we mint SVIDs directly off the server (no agent, no
# node/workload attestation) — a genuine SPIRE-signed SVID against
# SPIRE's real JWKS, with a two-service footprint.
#
#   # Bring up just the SPIRE layer:
#   docker compose -f docker-compose.yml -f docker-compose.spire.yml \
#     up -d spire-server spire-oidc
#
#   # Mint the agent's JWT-SVID (audience = the demo realm's issuer):
#   docker compose -f docker-compose.yml -f docker-compose.spire.yml \
#     exec spire-server /opt/spire/bin/spire-server jwt mint \
#       -spiffeID spiffe://cpex.demo/agent/hr-copilot \
#       -audience http://localhost:8081/realms/cpex-demo
#
#   # Inspect the JWKS Keycloak will trust — MUST show "use":"sig":
#   curl -s http://localhost:8443/keys | jq
#
#   # And the discovery doc:
#   curl -s http://localhost:8443/.well-known/openid-configuration | jq

services:
  # Additively extend the demo's Keycloak (defined in docker-compose.yml)
  # so it can authenticate a workload by its SVID and mint tokens for it. This
  # block only overrides KC_FEATURES; every other keycloak setting (build,
  # ports, CIBA SPI, realm import, hostname) is inherited from the base file.
  keycloak:
    environment:
      # spiffe:v1               -> native SPIFFE identity provider
      #                            (providerId: spiffe) + the `federated-jwt`
      #                            client authenticator. Lets a client present
      #                            its JWT-SVID as an RFC 7523 client_assertion
      #                            (type ...:jwt-spiffe) instead of a secret;
      #                            KC validates it against the SPIFFE trust
      #                            bundle. This is how an SVID enters OAuth per
      #                            draft-ietf-oauth-spiffe-client-auth.
      # token-exchange-standard -> the demo's existing internal->internal v2
      #                            exchange, used to scope the workload's token
      #                            down to a downstream audience (unchanged).
      #
      # NB: an SVID is NOT a subject_token — Keycloak's SPIFFE support is client
      # authentication only, so no legacy token-exchange / fine-grained-authz is
      # involved here.
      KC_FEATURES: token-exchange-standard,spiffe:v1

  spire-server:
    image: ghcr.io/spiffe/spire-server:1.9.6   # bumpable; 1.9.x line
    container_name: cpex-demo-spire-server
    command: ["-config", "/opt/spire/conf/server/server.conf"]
    volumes:
      - ./spire/server/server.conf:/opt/spire/conf/server/server.conf:ro
      - spire-server-data:/opt/spire/data/server
      # Shared admin socket dir — spire-oidc reads the bundle through it.
      - spire-server-socket:/tmp/spire-server/private
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-server", "healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  spire-oidc:
    image: ghcr.io/spiffe/oidc-discovery-provider:1.9.6   # match server tag
    container_name: cpex-demo-spire-oidc
    command: ["-config", "/opt/spire/conf/oidc/oidc-discovery-provider.conf"]
    depends_on:
      spire-server:
        condition: service_healthy
    volumes:
      - ./spire/oidc/oidc-discovery-provider.conf:/opt/spire/conf/oidc/oidc-discovery-provider.conf:ro
      - spire-server-socket:/tmp/spire-server/private:ro
    ports:
      - "8443:8443"

volumes:
  spire-server-data:
  spire-server-socket:
