# SPIRE OIDC Discovery Provider for the CPEX HR demo.
#
# Publishes the SPIRE server's JWT signing keys as a standard OIDC
# discovery document + JWKS, so Keycloak can validate JWT-SVIDs exactly
# like any other OIDC issuer's tokens:
#
#   GET /.well-known/openid-configuration   -> issuer + jwks_uri
#   GET /keys                               -> the JWKS
#
# Whether Keycloak trusts these via a native SPIFFE IdP (26.4+) or a
# generic OIDC IdP (works on 26.2), it reads the same two endpoints.

log_level = "info"

# Hostnames this provider answers for. `spire-oidc` is the compose
# service name Keycloak reaches it by; `localhost` is for host-side
# curl checks via the published port.
domains = ["spire-oidc", "localhost"]

# Serve plain HTTP for the demo (no in-compose TLS termination). The
# issuer is therefore http://spire-oidc:8443 — matches server.conf's
# jwt_issuer.
insecure_addr = "0.0.0.0:8443"

# CRITICAL: without this the published JWKS omits the `use` field, and
# Keycloak rejects any signing key that doesn't declare `"use": "sig"`.
# This is the single most common SPIRE<->Keycloak integration failure.
set_key_use = true

# Source the trust bundle (the JWKS) straight from the SPIRE server over
# its local admin socket, shared via a compose volume. No SPIRE agent
# required — matches the mint-directly topology in server.conf.
server_api {
    address = "unix:///tmp/spire-server/private/api.sock"
}
