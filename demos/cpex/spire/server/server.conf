# SPIRE server for the CPEX HR demo.
#
# This is the workload-identity authority: it owns the `cpex.demo` trust
# domain and holds the JWT signing keys. The OIDC discovery provider
# (see ../oidc/) publishes those keys as a JWKS so Keycloak can validate
# JWT-SVIDs the same way it validates any other OIDC issuer's tokens.
#
# For the demo we mint SVIDs directly off the server with
# `spire-server jwt mint` (no agent, no node/workload attestation). That
# keeps the compose surface to two services while still producing a
# genuine SPIRE-signed SVID against SPIRE's real JWKS. Agent-based
# attestation is the production-hardening step, added later.

server {
    bind_address = "0.0.0.0"
    bind_port    = "8082"          # NOT 8081 — Keycloak owns 8081.
    trust_domain = "cpex.demo"
    data_dir     = "/opt/spire/data/server"
    log_level    = "INFO"

    ca_ttl                = "24h"
    default_x509_svid_ttl = "1h"
    default_jwt_svid_ttl  = "1h"

    # Issuer stamped into JWT-SVIDs and advertised by the OIDC provider's
    # /.well-known/openid-configuration. Keycloak's SPIFFE/OIDC IdP is
    # pointed at this exact URL (Brick 2), so the two must agree.
    jwt_issuer = "http://spire-oidc:8443"
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type     = "sqlite3"
            connection_string = "/opt/spire/data/server/datastore.sqlite3"
        }
    }

    # Disk keymanager so the JWT signing key survives a restart — the
    # JWKS Keycloak trusts stays stable across `docker compose restart`.
    KeyManager "disk" {
        plugin_data {
            keys_path = "/opt/spire/data/server/keys.json"
        }
    }

    # Present so `spire-server` starts cleanly; unused while we mint
    # directly. When we add an agent (attestation brick) it joins here.
    NodeAttestor "join_token" {
        plugin_data {}
    }
}
